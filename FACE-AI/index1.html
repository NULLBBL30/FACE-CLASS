<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Learning Assessment System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; padding: 40px 20px; color: #f8fafc; }
        .container { max-width: 1100px; margin: 0 auto; }
        .main-title { text-align: center; font-size: 32px; background: linear-gradient(90deg, #38bdf8, #60a5fa); -webkit-background-clip: text; color: transparent; margin-bottom: 40px; text-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 18px; padding: 30px; margin-bottom: 25px; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2); }
        .card-title { font-size: 20px; color: #e0f2fe; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
        .card-title::before { content:''; width:4px; height:18px; background:#38bdf8; border-radius:2px; }

        .form-wrap { display: flex; flex-wrap: wrap; align-items: center; gap: 15px; }

        /* 强制覆盖浏览器原生文件上传按钮样式 */
        input[type="file"] { display: none; }
        .file-label { padding: 11px 18px; background: rgba(0,0,0,0.2); border: 1px dashed #38bdf8; border-radius: 10px; color: #38bdf8; font-size: 14px; cursor: pointer; transition: 0.3s; display: inline-block; }
        .file-label:hover { background: rgba(56, 189, 248, 0.1); border-style: solid; }
        .file-name { font-size: 13px; color: #94a3b8; max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .btn { padding: 12px 24px; background: linear-gradient(135deg, #38bdf8, #2563eb); border: none; border-radius: 10px; color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(37,99,235,0.3); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(37,99,235,0.4); }
        .btn:disabled { background: #64748b; cursor: not-allowed; }

        .result-img { width: 100%; border-radius: 14px; margin: 15px 0; border: 1px solid rgba(56,189,248,0.2); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
        .summary-card-p { background: rgba(56, 189, 248, 0.12); border-left: 4px solid #38bdf8; border-radius: 8px; padding: 15px; margin: 10px 0; color: #e0f2fe; font-size: 15px; line-height: 1.6; }
        .result-title { color: #bae6fd; font-size: 17px; margin-top: 20px; }

        .loading-text { font-size: 16px; color: #38bdf8; text-align: center; padding: 30px 0; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% {opacity: 1;} 50% {opacity: 0.6;} }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">Classroom Learning Assessment System</h1>

        <div class="card">
            <h3 class="card-title">Classroom Assessment</h3>
            <div class="form-wrap">
                <input type="file" id="class_img" accept="image/*" onchange="updateFileName(this, 'class_filename')">
                <label for="class_img" class="file-label">📷 Select Image</label>
                <span id="class_filename" class="file-name">No file chosen</span>

                <button class="btn" id="analyze_btn" onclick="analyze()">🚀 Start Assessment</button>
            </div>
            <div id="analyze_result_panel"></div>
        </div>
    </div>

    <script>
        // 动态更新自定义文件名的显示
        function updateFileName(input, textId) {
            const textSpan = document.getElementById(textId);
            if (input.files && input.files.length > 0) {
                textSpan.innerText = input.files[0].name;
            } else {
                textSpan.innerText = 'No file chosen';
            }
        }

        function analyze(){
            const file = document.getElementById('class_img').files[0];
            if(!file){
                alert('⚠️ Please select a classroom image to assess!');
                return;
            }
            const panel = document.getElementById('analyze_result_panel');
            const btn = document.getElementById('analyze_btn');

            btn.disabled = true;
            btn.innerText = '⏳ Deep Assessment in Progress...';
            panel.innerHTML = '<div class="loading-text">⏳ Processing assessment, please wait...</div>';

            let fd = new FormData();
            fd.append('image', file);

            fetch('/analyze', {method:'POST', body:fd})
            .then(r => r.json()).then(d => {
                let html = '';
                if(d.status === 'success'){
                    // 显示处理后的图像
                    if(d.img) html += `<img src="${d.img}" class="result-img" alt="Assessment Result Image">`;

                    // 仅显示整体评估和结论
                    if(d.summary && d.summary.length > 0){
                        html += '<h4 class="result-title">📊 Overall Classroom Assessment</h4>';
                        html += '<div class="summary-card-p">';
                        d.summary.forEach(s => html += `<div>${s}</div>`);
                        html += '</div>';
                    }

                    // 已根据要求删除 d.students 列表展示的逻辑

                } else {
                    html = `<div class="loading-text" style="color:#ef4444;">Failed to generate report: ${d.msg}</div>`;
                }
                panel.innerHTML = html;
            })
            .catch(e => {
                panel.innerHTML = `<div class="loading-text" style="color:#ef4444;">Network error, request failed.</div>`;
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerText = '🚀 Start Assessment';
            });
        }
    </script>
</body>
</html>
